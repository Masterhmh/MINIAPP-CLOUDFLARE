<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mini App Tổng Overview Chi Tiêu</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <link rel="stylesheet" href="styles.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
  <!-- Dùng bản rời (unbundled) thay vì html2pdf.bundle.min.js vì bản bundle
       đóng gói nội bộ (webpack) không phơi html2canvas/jsPDF ra window,
       trong khi script.js cần gọi trực tiếp 2 thư viện này. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="theme-auto">
  <div class="content-wrapper">
    <div class="app-branding">©masterhmh</div>
    
    <div id="tab1" class="tab-content active">
      <div class="hero-card">
        <div class="hero-date-nav">
          <button id="prevDayBtn" class="date-nav-btn"><i class="fas fa-chevron-left"></i></button>
          <div class="hero-date" id="displayCurrentDate">Hôm nay, ...</div>
          <button id="nextDayBtn" class="date-nav-btn"><i class="fas fa-chevron-right"></i></button>
        </div>
        
        <div class="hero-label" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
          <div><i class="fas fa-money-bill-transfer"></i> Chi tiêu trong ngày</div>
          <i class="fas fa-eye-slash privacy-toggle-btn" onclick="togglePrivacy()" style="font-size: 1.15rem; cursor: pointer; padding: 4px; color: rgba(255,255,255,0.8);"></i>
        </div>
        <div class="hero-balance" id="heroExpenseMain">—</div>
        <div id="heroExpenseCompare"></div>
        <div class="hero-sub">
          <div class="hero-stat">
            <div class="hero-stat-label"><i class="fas fa-hand-holding-dollar"></i> Thu nhập</div>
            <div class="hero-stat-val" id="heroIncome">—</div>
          </div>
          <div class="divider-v"></div>
          <div class="hero-stat">
            <div class="hero-stat-label"><i class="fas fa-wallet"></i> Số dư</div>
            <div class="hero-stat-val" id="heroBalanceSub">—</div>
          </div>
        </div>
      </div>
      
      <div class="quick-actions">
        <div class="qa-btn qa-btn-relative" onclick="try{ document.getElementById('transactionDate').showPicker(); } catch(e){}">
          <div class="qa-icon filter"><i class="fas fa-calendar-day"></i></div>
          <span class="qa-label">Lọc ngày</span>
          <input type="date" id="transactionDate" class="hidden-picker">
        </div>
        <div class="qa-btn" onclick="openAddForm()">
          <div class="qa-icon add"><i class="fas fa-plus"></i></div>
          <span class="qa-label">Thêm mới</span>
        </div>
